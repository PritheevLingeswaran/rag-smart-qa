services:
  api:
    build: .
    container_name: rag-smart-qa-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./prompts:/app/prompts
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: rag-smart-qa-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
