app:
  name: rag-smart-qa
  environment: dev

paths:
  data_dir: data
  raw_dir: data/raw/documents
  uploads_dir: data/raw/documents/uploads
  processed_dir: data/processed
  chunks_dir: data/processed/chunks
  metadata_dir: data/processed/metadata
  indexes_dir: data/processed/indexes
  app_db_path: data/processed/metadata/app.db

ingestion:
  supported_extensions: [".pdf", ".txt", ".md", ".html", ".htm"]
  deduplicate_documents: true
  max_document_chars: 500000
  max_upload_size_mb: 25

preprocessing:
  cleaning:
    normalize_whitespace: true
    drop_null_bytes: true
  chunking:
    strategy: token
    chunk_size: 500
    chunk_overlap: 100
    max_chars_fallback: 4000

embeddings:
  provider: openai   # openai | sentence_transformers
  model: text-embedding-3-small
  batch_size: 64
  openai:
    base_url: ${OPENAI_BASE_URL}
    api_key: ${OPENAI_API_KEY}
    organization: ${OPENAI_ORG}
    request_timeout_s: 30
    max_retries: 3
    usd_per_1k_tokens: 0.00002
  sentence_transformers:
    model_name: all-MiniLM-L6-v2

vector_store:
  provider: chroma   # chroma | faiss | pinecone
  top_k: 12
  faiss:
    metric: cosine
    normalize: true
  chroma:
    persist_dir: data/processed/indexes/chroma
    collection_name: rag-smart-qa
  pinecone:
    api_key: ${PINECONE_API_KEY}
    environment: ${PINECONE_ENV}
    index_name: rag-smart-qa

retrieval:
  query_rewrite:
    enabled: true
    model: gpt-4o-mini
  bm25:
    lowercase: true
    strip_punctuation: true
    remove_stopwords: true
    stemming: false
    min_token_length: 2
  cache:
    enabled: true
    max_entries: 256
  hybrid:
    enabled: false
    fusion_method: weighted
    # Candidate set sizes for hybrid retrieval.
    # bm25_k is over the FULL corpus.
    bm25_k: 200
    dense_k: 40
    # Tunable fusion weight: final = dense_weight*dense + (1-dense_weight)*bm25
    dense_weight: 0.65
    rrf_k: 60
    min_dense_score: 0.0
    min_sparse_score: 0.0
  rerank:
    enabled: false
    provider: lexical
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
    query_weight: 0.6
    retrieval_weight: 0.4
    min_query_term_coverage: 0.1
  min_score: 0.20
  refuse_if_top_score_below: 0.35
  refuse_if_top_gap_below: 0.03
  debug_top_n: 5

generation:
  model: gpt-4o-mini
  temperature: 0.0
  max_output_tokens: 700
  strict_refusal: true
  answerability:
    answerable_top_score: 0.30
    partial_top_score: 0.18
    evidence_score_threshold: 0.16
    min_supporting_hits: 1
    min_query_term_coverage: 0.20
  pricing:
    input_usd_per_1k_tokens: 0.00015
    output_usd_per_1k_tokens: 0.0006
    pricing_source: openai-list-price-config

api:
  host: 0.0.0.0
  port: 8000
  cors:
    allow_origins: ["http://localhost:3000", "http://127.0.0.1:3000"]
  reload: true
  enable_debug_retrieval_endpoint: false
  request_timeout_s: 60
  retrieval_timeout_s: 15
  generation_timeout_s: 30
  max_query_length: 4000
  max_upload_files: 10

storage:
  provider: local

summaries:
  enabled: true
  model: gpt-4o-mini
  max_context_chars: 18000
  max_points: 5

auth:
  enabled: false
  provider: none
  header_user_id: x-user-id
  api_key_header: x-api-key
  api_keys: []
  demo_user_id: local-user

monitoring:
  prometheus:
    enabled: true
    endpoint: /metrics
  rate_limit:
    enabled: true
    requests_per_minute: 60
    burst: 10
    key_strategy: user_or_ip

evaluation:
  dataset_path: evaluation/datasets/gold.jsonl
  judge_model: gpt-4o-mini
  enable_llm_judge: false

load_test:
  base_url: http://localhost:8000
  endpoint: /query
  concurrency: 20
  total_requests: 200
  timeout_s: 60
  use_eval_questions: true
